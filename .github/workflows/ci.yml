name: Basic CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-android:
    name: Build & Test Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-overwrite-existing: true

      - name: Run Shared Module Android Tests
        run: ./gradlew :shared:testAndroidHostTest

      - name: Build Android Debug App
        run: ./gradlew :androidApp:assembleDebug

  build-ios:
    name: Build & Test iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-overwrite-existing: true

      - name: Run Shared Module iOS Tests
        run: ./gradlew :shared:iosSimulatorArm64Test

      - name: Build iOS Shared Framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
